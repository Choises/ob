<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕸𝖚𝖘ἱ𝖈💕𝕮𝖍𝖔ἱ𝖈𝖊𝖘 - Full Screen Player</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
          
        }

        .player-section {
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }
        .player-section iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        .live-title-section {
            position: absolute;
            top: 40%;
            left: 38%; 
            transform: translate(-50%, -50%); 
            width: 80%; 
            max-width: 450px; 
            height: 48px;
            overflow: hidden; 
            background: transparent;
            z-index: 10; 
            pointer-events: none; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title-mask-container {
            width: 600px;         
            height: 70px;         
            overflow: hidden;     
            position: relative;
            background: transparent; 
            border: none;            
            display: flex;
            align-items: center;
        }

        #metadataIframe {
            width: 600px;
            height: 100px;
            border: none;
            position: absolute;
            top: 20px;            
            transform: scale(1.8); 
            transform-origin: left center;
            mix-blend-mode: screen;

            /* Έντονο Κυανό Neon Glow */
            filter: invert(1) sepia(1) saturate(8) hue-rotate(145deg)
                    drop-shadow(0px 0px 3px #00f5ff) 
                    drop-shadow(0px 0px 8px #00adb5); 

            animation: marqueeEffect 12s linear infinite;
        }

        @keyframes marqueeEffect {
            0% { left: 100%; }
            100% { left: -120%; }
        }
    </style>
</head>
<body>

   
    <div class="player-section">
        <iframe id="mainPlayerIframe" scrolling="no"></iframe>
    </div>

  
    <div class="live-title-section">
        <div class="title-mask-container">
            <iframe id="metadataIframe" scrolling="no"></iframe>
        </div>
    </div>
